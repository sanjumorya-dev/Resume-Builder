<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Builder Dashboard</title>
    <script>
      window.tailwind = window.tailwind || {};
      tailwind.config = {
        darkMode: 'class'
      };

      const savedTheme = localStorage.getItem('themePreference');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div class="min-h-full p-4 md:p-8">
      <header class="mb-6 flex flex-wrap items-center justify-between gap-3">
        <h1 class="text-2xl font-bold">Resume Builder Dashboard</h1>
        <button
          id="themeToggle"
          class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-900"
        >
          Toggle Theme
        </button>
      </header>

      <div class="grid grid-cols-1 gap-4 lg:grid-cols-3">
        <aside class="rounded-lg bg-white p-4 shadow dark:bg-slate-900">
          <div class="mb-3 flex items-center justify-between">
            <h2 class="font-semibold">Resumes</h2>
            <button
              id="newResumeBtn"
              class="rounded bg-indigo-600 px-2 py-1 text-xs text-white"
            >
              New Resume
            </button>
          </div>
          <ul id="resumeList" class="space-y-2"></ul>
        </aside>

        <main class="rounded-lg bg-white p-4 shadow dark:bg-slate-900 lg:col-span-2">
          <div class="mb-3 grid grid-cols-1 gap-3 md:grid-cols-3">
            <input
              id="titleInput"
              class="rounded-md border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
              placeholder="Resume title"
            />
            <button id="saveDraftBtn" class="rounded bg-emerald-600 px-3 py-2 text-sm text-white">
              Save Current Draft
            </button>
            <button id="duplicateBtn" class="rounded bg-violet-600 px-3 py-2 text-sm text-white">
              Duplicate as New Version
            </button>
          </div>

          <textarea
            id="contentInput"
            rows="16"
            class="w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-700 dark:bg-slate-950"
            placeholder="Write or paste your resume here..."
          ></textarea>

          <div class="mt-3 flex flex-wrap items-center justify-between gap-2">
            <p id="status" class="text-sm text-slate-500 dark:text-slate-400">No resume selected.</p>
            <button id="deleteBtn" class="rounded bg-rose-600 px-3 py-2 text-sm text-white">
              Delete Resume
            </button>
          </div>

          <section class="mt-5">
            <h3 class="mb-2 font-semibold">Version History</h3>
            <ul id="versionList" class="space-y-2"></ul>
          </section>
        </main>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
